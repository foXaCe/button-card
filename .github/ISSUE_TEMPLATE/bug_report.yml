name: Bug Report
description: Report a bug in button-card
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: Please fill in as much as possible so the issue can be diagnosed quickly.
  - type: checkboxes
    id: preflight
    attributes:
      label: Checklist
      options:
        - label: I updated the card to the latest version available
          required: true
        - label: I searched existing issues
          required: true
        - label: I cleared the cache of my browser
          required: false
  - type: input
    id: card-version
    attributes:
      label: button-card version
      placeholder: e.g. 7.0.1
    validations:
      required: true
  - type: input
    id: ha-version
    attributes:
      label: Home Assistant version
      placeholder: e.g. 2026.6.0
    validations:
      required: true
  - type: dropdown
    id: install-method
    attributes:
      label: Installation method
      options:
        - HACS
        - Manual
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Describe the bug
      description: What happens? What did you expect to happen?
    validations:
      required: true
  - type: textarea
    id: config
    attributes:
      label: Card configuration
      description: The YAML configuration you used (rendered as code, no backticks needed).
      render: yaml
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots
      description: If applicable, add screenshots to help explain the problem.
  - type: textarea
    id: environment
    attributes:
      label: Browser / device
      placeholder: e.g. Chrome 126 on Android 14, or Safari on iPhone 15
